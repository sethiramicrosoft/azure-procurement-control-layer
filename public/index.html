<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>APCL | Azure Procurement Control Layer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div>
        <p class="eyebrow">Azure Procurement Control Layer</p>
        <h1>Procurement-aware Azure governance.</h1>
        <p class="lead">APCL turns procurement rules into enforceable cloud controls: request, approve, deploy, reconcile.</p>
      </div>
      <section class="hero-card">
        <div class="stat">
          <span id="stat-requests">0</span>
          <label>Requests</label>
        </div>
        <div class="stat">
          <span id="stat-approved">0</span>
          <label>Approved</label>
        </div>
        <div class="stat">
          <span id="stat-deployed">0</span>
          <label>Deployed</label>
        </div>
      </section>
    </header>

    <main class="grid">
      <section class="panel">
        <h2>New request</h2>
        <form id="request-form" class="form">
          <input name="title" placeholder="Request title" required />
          <input name="requester" placeholder="Requester email" required />
          <input name="tenant" placeholder="Tenant" required />
          <input name="subscription" placeholder="Subscription" required />
          <input name="resourceType" placeholder="Resource type" value="Microsoft.Compute/virtualMachines" required />
          <div class="row">
            <input name="region" placeholder="Region" value="australiaeast" required />
            <input name="sku" placeholder="SKU" value="Standard_D2s_v5" required />
          </div>
          <div class="row">
            <input name="costCenter" placeholder="CostCenter" value="ENG001" required />
            <input name="poId" placeholder="PO_ID" value="PO-0001" required />
          </div>
          <input name="owner" placeholder="Owner" required />
          <input name="estimatedMonthlyCost" type="number" min="0" step="0.01" placeholder="Estimated monthly cost" required />
          <textarea name="justification" rows="3" placeholder="Business justification" required></textarea>
          <button type="submit">Submit request</button>
        </form>
      </section>

      <section class="panel">
        <h2>Governance profile</h2>
        <div id="policy" class="policy"></div>
        <h3>Budgets</h3>
        <div id="budgets" class="budget-list"></div>
      </section>
    </main>

    <section class="panel">
      <div class="section-head">
        <h2>Requests</h2>
        <button id="refresh">Refresh</button>
      </div>
      <div id="requests" class="requests"></div>
    </section>

    <section class="panel">
      <h2>Audit trail</h2>
      <div id="audit" class="audit"></div>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
