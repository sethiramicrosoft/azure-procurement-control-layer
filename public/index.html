<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>APCL | Azure Procurement Control Layer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div>
        <p class="eyebrow">Azure Procurement Control Layer</p>
        <h1>Procurement-aware Azure governance.</h1>
        <p class="lead">APCL turns procurement rules into enforceable cloud controls: request, approve, deploy, reconcile.</p>
        <div class="view-switcher">
          <span class="muted">View:</span>
          <button type="button" class="view-btn active" data-view="procurement">Procurement</button>
          <button type="button" class="view-btn" data-view="engineer">Engineer</button>
          <button type="button" class="view-btn" data-view="finance">Finance</button>
          <button type="button" class="view-btn" data-view="platform">Platform</button>
          <button type="button" class="view-btn" data-view="all">All</button>
          <span id="identity-pill" class="badge">Loading identity...</span>
        </div>
      </div>
      <section class="hero-card">
        <div class="stat">
          <span id="stat-requests">0</span>
          <label>Requests</label>
        </div>
        <div class="stat">
          <span id="stat-approved">0</span>
          <label>Approved</label>
        </div>
        <div class="stat">
          <span id="stat-deployed">0</span>
          <label>Deployed</label>
        </div>
      </section>
    </header>

    <main class="grid">
      <section class="panel" data-section="platform">
        <h2>Control plane inputs</h2>
        <form id="config-form" class="form">
          <input name="managerApproverEmail" placeholder="Manager approver email" required />
          <input name="procurementApproverEmail" placeholder="Procurement approver email" required />
          <input name="financeApproverEmail" placeholder="Finance approver email" required />
          <div class="row">
            <input name="defaultBudgetCap" type="number" min="1" step="1" placeholder="Default budget cap" required />
            <input name="defaultExceptionDurationHours" type="number" min="1" step="1" placeholder="Default exception hours" required />
          </div>
          <input name="defaultBudgetThresholds" placeholder="Budget thresholds, comma-separated (e.g. 80,100)" required />
          <button type="submit">Save defaults</button>
        </form>
      </section>

      <section class="panel" data-section="engineer">
        <h2>New request</h2>
        <form id="request-form" class="form">
          <input name="title" placeholder="Request title" required />
          <input name="requester" placeholder="Requester email" required />
          <input name="tenant" placeholder="Tenant" required />
          <input name="subscription" placeholder="Subscription" required />
          <input name="resourceType" placeholder="Resource type" value="Microsoft.Compute/virtualMachines" required />
          <div class="row">
            <input name="region" placeholder="Region" value="australiaeast" required />
            <input name="sku" placeholder="SKU" value="Standard_D2s_v5" required />
          </div>
          <div class="row">
            <input name="costCenter" placeholder="CostCenter" value="ENG001" required />
            <input name="poId" placeholder="PO_ID" value="PO-0001" required />
          </div>
          <div class="row">
            <input name="managerApproverEmail" placeholder="Manager approver email" required />
            <input name="procurementApproverEmail" placeholder="Procurement approver email" required />
          </div>
          <div class="row">
            <input name="desiredBudgetCap" type="number" min="1" step="1" placeholder="Budget cap for this request" required />
            <input name="budgetThresholdsCsv" placeholder="Thresholds % (e.g. 80,100)" required />
          </div>
          <input name="owner" placeholder="Owner" required />
          <input name="estimatedMonthlyCost" type="number" min="0" step="0.01" placeholder="Estimated monthly cost" required />
          <textarea name="justification" rows="3" placeholder="Business justification" required></textarea>
          <button type="submit">Submit request</button>
        </form>
      </section>

      <section class="panel" data-section="finance platform procurement">
        <h2>Governance profile</h2>
        <div id="policy" class="policy"></div>
        <h3>Budgets</h3>
        <div id="budgets" class="budget-list"></div>
      </section>
    </main>

    <section class="panel" data-section="engineer procurement platform finance">
      <div class="section-head">
        <h2>Requests</h2>
        <button id="refresh">Refresh</button>
      </div>
      <div id="requests" class="requests"></div>
    </section>

    <section class="panel" data-section="procurement finance platform">
      <h2>Audit trail</h2>
      <div id="audit" class="audit"></div>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
