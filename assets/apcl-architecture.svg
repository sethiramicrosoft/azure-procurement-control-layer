<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
    <style>
      .title { font: 700 28px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
      .laneTitle { font: 700 20px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
      .boxTitle { font: 700 15px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
      .boxText { font: 400 13px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
      .label { font: 600 12px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#ffffff"/>
  <text x="40" y="50" class="title">Azure Procurement Control Layer (APCL) - Enterprise Architecture</text>

  <!-- Actors -->
  <rect x="30" y="80" width="1540" height="140" fill="none" stroke="#0078D4" stroke-width="2" rx="10"/>
  <text x="45" y="110" class="laneTitle">Actors</text>
  <rect x="70" y="130" width="230" height="70" fill="#CFE4FA" stroke="#0078D4" stroke-width="2" rx="8"/>
  <text x="86" y="156" class="boxTitle">Engineer / Requester</text>
  <text x="86" y="176" class="boxText">Creates demand request</text>
  <rect x="330" y="130" width="230" height="70" fill="#FFF4CE" stroke="#F7630C" stroke-width="2" rx="8"/>
  <text x="346" y="156" class="boxTitle">Procurement</text>
  <text x="346" y="176" class="boxText">Approval / exceptions</text>
  <rect x="590" y="130" width="230" height="70" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="606" y="156" class="boxTitle">FinOps</text>
  <text x="606" y="176" class="boxText">Budgets / chargeback</text>
  <rect x="850" y="130" width="290" height="70" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="866" y="156" class="boxTitle">Platform / SecOps</text>
  <text x="866" y="176" class="boxText">ALZ, policy, RBAC, SIEM</text>

  <!-- APCL -->
  <rect x="30" y="240" width="1540" height="250" fill="none" stroke="#107C10" stroke-width="2" rx="10"/>
  <text x="45" y="270" class="laneTitle">APCL Central Control Plane</text>

  <rect x="70" y="305" width="230" height="80" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="86" y="333" class="boxTitle">1) Request API + UI</text>
  <text x="86" y="354" class="boxText">Intake + metadata checks</text>

  <rect x="340" y="305" width="260" height="80" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="356" y="333" class="boxTitle">2) Approval + Exception Engine</text>
  <text x="356" y="354" class="boxText">Decision workflow</text>

  <rect x="640" y="305" width="220" height="80" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="656" y="333" class="boxTitle">3) Entitlement Service</text>
  <text x="656" y="354" class="boxText">TTL + single-use token</text>

  <rect x="900" y="305" width="300" height="80" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="916" y="333" class="boxTitle">4) Assignment Policy Router</text>
  <text x="916" y="354" class="boxText">Cost center -> target scope</text>

  <rect x="1240" y="305" width="280" height="80" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="1256" y="333" class="boxTitle">5) Audit Chain</text>
  <text x="1256" y="354" class="boxText">Tamper-evident control events</text>

  <rect x="620" y="405" width="360" height="65" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="636" y="432" class="boxTitle">Reconciliation Service</text>
  <text x="636" y="452" class="boxText">Chargeback summary + orphan detection</text>

  <!-- Azure Platform -->
  <rect x="30" y="510" width="1540" height="220" fill="none" stroke="#5C2D91" stroke-width="2" rx="10"/>
  <text x="45" y="540" class="laneTitle">Azure Platform (Landing Zone + Workload Estate)</text>

  <rect x="70" y="570" width="290" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="86" y="598" class="boxTitle">Subscription Vending / Orchestrator</text>
  <text x="86" y="618" class="boxText">Consumes APCL handoff payload</text>

  <rect x="400" y="570" width="270" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="416" y="598" class="boxTitle">ALZ Management Groups</text>
  <text x="416" y="618" class="boxText">Inherited baseline controls</text>

  <rect x="710" y="570" width="300" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="726" y="598" class="boxTitle">Target Subscriptions + RGs</text>
  <text x="726" y="618" class="boxText">Routed by assignment policy</text>

  <rect x="1050" y="570" width="250" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="1066" y="598" class="boxTitle">Policy Enforcement</text>
  <text x="1066" y="618" class="boxText">Tags, regions, SKU guardrails</text>

  <rect x="1340" y="570" width="190" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="1356" y="598" class="boxTitle">Workload Deploy</text>
  <text x="1356" y="618" class="boxText">Entitlement required</text>

  <!-- Ops -->
  <rect x="30" y="750" width="1540" height="190" fill="none" stroke="#0c8599" stroke-width="2" rx="10"/>
  <text x="45" y="780" class="laneTitle">Operations and Financial Visibility</text>

  <rect x="70" y="805" width="250" height="95" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="86" y="832" class="boxTitle">Cost Export Ingestion</text>
  <text x="86" y="853" class="boxText">Billing/usage import</text>
  <text x="86" y="873" class="boxText">to reconciliation</text>

  <rect x="350" y="805" width="250" height="95" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="366" y="832" class="boxTitle">RBAC Drift Checks</text>
  <text x="366" y="853" class="boxText">High-privilege role</text>
  <text x="366" y="873" class="boxText">drift detection</text>

  <rect x="630" y="805" width="250" height="95" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="646" y="832" class="boxTitle">SIEM + Alerts</text>
  <text x="646" y="853" class="boxText">Denied deploys, invalid</text>
  <text x="646" y="873" class="boxText">tokens, exception signals</text>

  <rect x="910" y="805" width="280" height="95" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="926" y="832" class="boxTitle">Chargeback + Showback</text>
  <text x="926" y="853" class="boxText">Cost center + PO aligned</text>
  <text x="926" y="873" class="boxText">financial accountability</text>

  <rect x="1220" y="805" width="310" height="95" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="1236" y="832" class="boxTitle">Procurement/Finance Visibility</text>
  <text x="1236" y="853" class="boxText">Request-to-spend lineage</text>
  <text x="1236" y="873" class="boxText">and orphan spend insights</text>

  <!-- Main APCL flow arrows -->
  <line x1="300" y1="345" x2="340" y2="345" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="345" x2="640" y2="345" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="860" y1="345" x2="900" y2="345" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1200" y1="345" x2="1240" y2="345" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vertical and horizontal handoff arrows -->
  <line x1="1045" y1="385" x2="1045" y2="570" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1056" y="483" class="label">deploy handoff</text>

  <line x1="360" y1="612" x2="400" y2="612" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="612" x2="710" y2="612" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1010" y1="612" x2="1050" y2="612" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1300" y1="612" x2="1340" y2="612" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="800" y1="470" x2="800" y2="805" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="812" y="645" class="label">reconciliation outputs</text>

  <line x1="195" y1="805" x2="620" y2="438" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="650" class="label">cost rows</text>
</svg>
