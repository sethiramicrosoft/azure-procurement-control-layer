<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="1040" viewBox="0 0 1760 1040">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
    <style>
      .title { font: 700 28px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
      .laneTitle { font: 700 20px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
      .boxTitle { font: 700 15px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
      .boxText { font: 400 13px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
      .label { font: 600 12px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
    </style>
  </defs>

  <rect x="0" y="0" width="1760" height="1040" fill="#ffffff"/>
  <text x="40" y="50" class="title">Azure Procurement Control Layer (APCL) - Current Reference Architecture</text>
  <text x="40" y="76" class="label">Current code paths: server.js, lib/state-store.js, lib/entitlement.js, lib/audit.js, infra/policies/policy-pack.bicep, infra/platform/main.json</text>

  <!-- Actors -->
  <rect x="30" y="90" width="1700" height="140" fill="none" stroke="#0078D4" stroke-width="2" rx="10"/>
  <text x="45" y="120" class="laneTitle">Actors</text>

  <rect x="70" y="135" width="240" height="70" fill="#CFE4FA" stroke="#0078D4" stroke-width="2" rx="8"/>
  <text x="86" y="162" class="boxTitle">Requester / Engineer</text>
  <text x="86" y="182" class="boxText">Creates the demand request</text>

  <rect x="340" y="135" width="240" height="70" fill="#FFF4CE" stroke="#F7630C" stroke-width="2" rx="8"/>
  <text x="356" y="162" class="boxTitle">Procurement</text>
  <text x="356" y="182" class="boxText">Approval and exceptions</text>

  <rect x="610" y="135" width="220" height="70" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="626" y="162" class="boxTitle">Finance</text>
  <text x="626" y="182" class="boxText">Budget and chargeback</text>

  <rect x="860" y="135" width="220" height="70" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="876" y="162" class="boxTitle">Platform / SecOps</text>
  <text x="876" y="182" class="boxText">Policy, RBAC, SIEM</text>

  <rect x="1110" y="135" width="370" height="70" fill="#F3F2F1" stroke="#495057" stroke-width="2" rx="8"/>
  <text x="1126" y="162" class="boxTitle">External Orchestrator</text>
  <text x="1126" y="182" class="boxText">Sub/vending and workload provisioning bridge</text>

  <!-- APCL -->
  <rect x="30" y="250" width="1700" height="330" fill="none" stroke="#107C10" stroke-width="2" rx="10"/>
  <text x="45" y="280" class="laneTitle">APCL Control Plane</text>

  <rect x="70" y="310" width="260" height="90" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="86" y="338" class="boxTitle">Request UI + API</text>
  <text x="86" y="359" class="boxText">Intake, config, request list</text>
  <text x="86" y="379" class="boxText">server.js + public/</text>

  <rect x="360" y="310" width="260" height="90" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="376" y="338" class="boxTitle">Approval / Exception Engine</text>
  <text x="376" y="359" class="boxText">Decision workflow and expiry</text>
  <text x="376" y="379" class="boxText">manager -> procurement -> finance -> platform</text>

  <rect x="650" y="310" width="220" height="90" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="666" y="338" class="boxTitle">Entitlement Tokens</text>
  <text x="666" y="359" class="boxText">Single-use deploy gate</text>
  <text x="666" y="379" class="boxText">lib/entitlement.js</text>

  <rect x="900" y="310" width="290" height="90" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="916" y="338" class="boxTitle">Assignment / Policy Router</text>
  <text x="916" y="359" class="boxText">Cost center, scope, workload type</text>
  <text x="916" y="379" class="boxText">policy pack + solution/service catalog</text>

  <rect x="1220" y="310" width="470" height="90" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="1236" y="338" class="boxTitle">Audit Chain + Reconciliation</text>
  <text x="1236" y="359" class="boxText">Tamper-evident audit, import rows, orphan spend, RBAC drift</text>
  <text x="1236" y="379" class="boxText">lib/audit.js + reconciliation endpoints</text>

  <rect x="70" y="430" width="270" height="80" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="86" y="458" class="boxTitle">State Backend</text>
  <text x="86" y="479" class="boxText">file | SQLite | managed adapter</text>

  <rect x="370" y="430" width="280" height="80" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="386" y="458" class="boxTitle">Deployment Status API</text>
  <text x="386" y="479" class="boxText">Callback, readiness, metrics</text>

  <rect x="680" y="430" width="300" height="80" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="696" y="458" class="boxTitle">Control-Plane Metrics</text>
  <text x="696" y="479" class="boxText">summary, posture, operations, audit</text>

  <rect x="1390" y="430" width="300" height="80" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="1406" y="458" class="boxTitle">Policy Pack + Templates</text>
  <text x="1406" y="479" class="boxText">required tags, allowed regions, VM SKUs, templates</text>

  <!-- Azure platform -->
  <rect x="30" y="610" width="1700" height="190" fill="none" stroke="#5C2D91" stroke-width="2" rx="10"/>
  <text x="45" y="640" class="laneTitle">Azure Platform</text>

  <rect x="70" y="665" width="330" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="86" y="693" class="boxTitle">Container Apps Runtime</text>
  <text x="86" y="714" class="boxText">ACA + ACR + Key Vault + Azure Files + Log Analytics</text>

  <rect x="430" y="665" width="320" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="446" y="693" class="boxTitle">Subscription Vending / Orchestrator</text>
  <text x="446" y="714" class="boxText">Consumes handoff payload and provisions workload</text>

  <rect x="780" y="665" width="340" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="796" y="693" class="boxTitle">ALZ Management Groups</text>
  <text x="796" y="714" class="boxText">Inherited policy assignments and boundary controls</text>

  <rect x="1150" y="665" width="500" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="1166" y="693" class="boxTitle">Target Subscriptions / Resource Groups / Workloads</text>
  <text x="1166" y="714" class="boxText">Governed deployments run here; status callbacks return to APCL</text>

  <!-- Operations -->
  <rect x="30" y="830" width="1700" height="170" fill="none" stroke="#0c8599" stroke-width="2" rx="10"/>
  <text x="45" y="860" class="laneTitle">Operations and Financial Visibility</text>

  <rect x="70" y="885" width="290" height="85" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="86" y="913" class="boxTitle">Cost Export Ingestion</text>
  <text x="86" y="934" class="boxText">Usage rows, chargeback inputs, orphan detection</text>

  <rect x="390" y="885" width="250" height="85" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="406" y="913" class="boxTitle">Chargeback / Showback</text>
  <text x="406" y="934" class="boxText">Cost center and PO lineage</text>

  <rect x="670" y="885" width="210" height="85" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="686" y="913" class="boxTitle">SIEM Alerts</text>
  <text x="686" y="934" class="boxText">Denied deploys and drift signals</text>

  <rect x="910" y="885" width="330" height="85" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="926" y="913" class="boxTitle">ERP / ITSM + Governance Reporting</text>
  <text x="926" y="934" class="boxText">PO sync, onboarding, posture, and audit reviews</text>

  <rect x="1270" y="885" width="370" height="85" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="1286" y="913" class="boxTitle">Long-Term Reconciliation</text>
  <text x="1286" y="934" class="boxText">Monthly rollups, spend reviews, and drift trends</text>

  <!-- Flow arrows -->
  <line x1="190" y1="205" x2="200" y2="310" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="205" x2="490" y2="310" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="205" x2="760" y2="310" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="970" y1="205" x2="1030" y2="310" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1290" y1="205" x2="1410" y2="310" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="330" y1="355" x2="360" y2="355" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="355" x2="650" y2="355" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="870" y1="355" x2="900" y2="355" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1190" y1="355" x2="1220" y2="355" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="1045" y1="400" x2="1045" y2="665" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1058" y="540" class="label">deployment handoff</text>

</svg>
