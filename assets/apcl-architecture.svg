<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
    <style>
      .title { font: 700 28px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
      .laneTitle { font: 700 20px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
      .boxTitle { font: 700 15px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
      .boxText { font: 400 13px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
      .label { font: 600 12px Segoe UI, Arial, sans-serif; fill: #1e1e1e; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#ffffff"/>
  <text x="40" y="50" class="title">Azure Procurement Control Layer (APCL) - Enterprise Architecture</text>

  <rect x="30" y="80" width="1540" height="150" fill="none" stroke="#0078D4" stroke-width="2" rx="10"/>
  <text x="45" y="110" class="laneTitle">Actors</text>

  <rect x="60" y="125" width="240" height="85" fill="#CFE4FA" stroke="#0078D4" stroke-width="2" rx="8"/>
  <text x="80" y="152" class="boxTitle">Engineer / Requester</text>
  <text x="80" y="175" class="boxText">Creates demand request</text>
  <text x="80" y="194" class="boxText">with procurement metadata</text>

  <rect x="330" y="125" width="240" height="85" fill="#FFF4CE" stroke="#F7630C" stroke-width="2" rx="8"/>
  <text x="350" y="152" class="boxTitle">Procurement Approver</text>
  <text x="350" y="175" class="boxText">Approves/rejects</text>
  <text x="350" y="194" class="boxText">or routes exception</text>

  <rect x="600" y="125" width="240" height="85" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="620" y="152" class="boxTitle">FinOps</text>
  <text x="620" y="175" class="boxText">Monitors budget,</text>
  <text x="620" y="194" class="boxText">chargeback, orphan spend</text>

  <rect x="870" y="125" width="300" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="890" y="152" class="boxTitle">Platform / SecOps</text>
  <text x="890" y="175" class="boxText">Operates ALZ, policy, RBAC,</text>
  <text x="890" y="194" class="boxText">drift and SIEM controls</text>

  <rect x="30" y="250" width="1540" height="240" fill="none" stroke="#107C10" stroke-width="2" rx="10"/>
  <text x="45" y="280" class="laneTitle">APCL Central Control Plane</text>

  <rect x="60" y="305" width="210" height="78" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="75" y="333" class="boxTitle">Request API + UI</text>
  <text x="75" y="354" class="boxText">Intake and validation</text>

  <rect x="300" y="305" width="250" height="78" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="315" y="333" class="boxTitle">Approval + Exception Engine</text>
  <text x="315" y="354" class="boxText">Policy decision workflow</text>

  <rect x="580" y="305" width="210" height="78" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="595" y="333" class="boxTitle">Entitlement Service</text>
  <text x="595" y="354" class="boxText">TTL + single-use token</text>

  <rect x="820" y="305" width="300" height="78" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="835" y="333" class="boxTitle">Assignment Policy Router</text>
  <text x="835" y="354" class="boxText">Cost center -> subscription archetype</text>

  <rect x="1150" y="305" width="190" height="78" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="1165" y="333" class="boxTitle">Audit Chain</text>
  <text x="1165" y="354" class="boxText">Tamper-evident events</text>

  <rect x="600" y="400" width="300" height="70" fill="#DFF6DD" stroke="#107C10" stroke-width="2" rx="8"/>
  <text x="615" y="428" class="boxTitle">Reconciliation Service</text>
  <text x="615" y="449" class="boxText">Chargeback + orphan detection</text>

  <rect x="30" y="510" width="1540" height="220" fill="none" stroke="#5C2D91" stroke-width="2" rx="10"/>
  <text x="45" y="540" class="laneTitle">Azure Platform (Landing Zone + Workload Estate)</text>

  <rect x="60" y="565" width="310" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="75" y="592" class="boxTitle">Subscription Vending / Orchestrator</text>
  <text x="75" y="615" class="boxText">Consumes APCL webhook payload</text>
  <text x="75" y="634" class="boxText">for Day-0 onboarding/provisioning</text>

  <rect x="400" y="565" width="280" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="415" y="592" class="boxTitle">ALZ Management Groups</text>
  <text x="415" y="615" class="boxText">Inherited policy and guardrails</text>
  <text x="415" y="634" class="boxText">at scale</text>

  <rect x="710" y="565" width="300" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="725" y="592" class="boxTitle">Target Subscriptions + Resource Groups</text>
  <text x="725" y="615" class="boxText">Governed routing by assignment policy</text>
  <text x="725" y="634" class="boxText">(cost center aware)</text>

  <rect x="1040" y="565" width="260" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="1055" y="592" class="boxTitle">Policy Initiative Enforcement</text>
  <text x="1055" y="615" class="boxText">Tags, regions, SKU controls</text>
  <text x="1055" y="634" class="boxText">deny non-compliant deploys</text>

  <rect x="1330" y="565" width="210" height="85" fill="#E8DAEF" stroke="#5C2D91" stroke-width="2" rx="8"/>
  <text x="1345" y="592" class="boxTitle">Workload Deployment</text>
  <text x="1345" y="615" class="boxText">Only with valid</text>
  <text x="1345" y="634" class="boxText">APCL entitlement</text>

  <rect x="30" y="750" width="1540" height="190" fill="none" stroke="#0c8599" stroke-width="2" rx="10"/>
  <text x="45" y="780" class="laneTitle">Operations and Financial Visibility</text>

  <rect x="60" y="805" width="260" height="95" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="75" y="832" class="boxTitle">Cost Export Ingestion</text>
  <text x="75" y="855" class="boxText">Billing/usage feed into</text>
  <text x="75" y="874" class="boxText">reconciliation pipeline</text>

  <rect x="350" y="805" width="260" height="95" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="365" y="832" class="boxTitle">RBAC Drift Checks</text>
  <text x="365" y="855" class="boxText">Detect standing high-privilege</text>
  <text x="365" y="874" class="boxText">human role assignments</text>

  <rect x="640" y="805" width="240" height="95" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="655" y="832" class="boxTitle">SIEM + Alerts</text>
  <text x="655" y="855" class="boxText">Denied deploys, invalid token</text>
  <text x="655" y="874" class="boxText">and exception signals</text>

  <rect x="910" y="805" width="280" height="95" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="925" y="832" class="boxTitle">Chargeback + Showback</text>
  <text x="925" y="855" class="boxText">Cost center and PO-aligned</text>
  <text x="925" y="874" class="boxText">financial accountability</text>

  <rect x="1220" y="805" width="320" height="95" fill="#99e9f2" stroke="#0c8599" stroke-width="2" rx="8"/>
  <text x="1235" y="832" class="boxTitle">Procurement / Finance Visibility</text>
  <text x="1235" y="855" class="boxText">Lineage from request to spend,</text>
  <text x="1235" y="874" class="boxText">including orphan spend insights</text>

  <line x1="300" y1="170" x2="300" y2="344" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="307" y="255" class="label">request</text>

  <line x1="550" y1="344" x2="580" y2="344" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="548" y="334" class="label">approved / exception-approved</text>

  <line x1="790" y1="344" x2="820" y2="344" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="793" y="334" class="label">entitlement + assignment context</text>

  <line x1="970" y1="383" x2="970" y2="565" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="980" y="485" class="label">deploy handoff</text>

  <line x1="1170" y1="650" x2="1170" y2="805" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1180" y="732" class="label">policy outcomes + telemetry</text>

  <line x1="320" y1="852" x2="600" y2="435" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="375" y="660" class="label">cost rows</text>

  <line x1="900" y1="435" x2="910" y2="852" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="915" y="635" class="label">chargeback summary</text>

  <line x1="1150" y1="344" x2="760" y2="805" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1010" y="590" class="label">audit + control events</text>
</svg>
