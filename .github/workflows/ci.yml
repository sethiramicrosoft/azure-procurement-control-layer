name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Azure CLI
        uses: azure/setup-azcli@v4

      - name: Install dependencies
        run: npm install

      - name: Validate server syntax
        run: node --check server.js

      - name: Run automated tests
        run: npm test

      - name: Validate Bicep compile
        run: az bicep build --file infra/platform/main.bicep
